content_modules:
  bio: "The Nikon D850 is the late-era Nikon DSLR reference point in this launch
    set: high-resolution, OVF-based, and still deeply attractive to buyers who
    want Nikon F-mount handling, long battery life, and serious stills quality
    without moving to mirrorless."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the sensor, viewfinder, and tilt LCD carefully because many D850
        bodies have seen long professional service.
      severity: high
    - code: check_shutter_and_controls
      label: Check shutter count, AF-point behavior, and the feel of every dial and
        joystick because this body is often used hard.
      severity: high
    - code: check_ports_and_card_slot
      label: Verify XQD and SD slot writes and inspect the USB and HDMI ports if the
        camera was used for tethering or studio video.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm EN-EL15a health and ask whether a grip or higher-speed battery
        setup was used to reach headline burst rates.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - DSLR-first buyers who still prefer an optical viewfinder and Nikon F-mount
      ergonomics.
    - Landscape, portrait, and studio shooters who want a mature high-resolution
      stills platform.
    - Used buyers with existing F-mount glass who do not want to rebuild around
      a mirrorless kit yet.
  not_ideal_for:
    - Buyers who specifically want Nikon's current mirrorless autofocus and
      stabilization advantages.
    - Casual shooters who do not need a heavy pro DSLR to make great images.
    - Anyone choosing primarily for video rather than for stills and OVF
      handling.
  strengths:
    - The D850 is still one of the most respected stills-first Nikon bodies ever
      made.
    - Resolution, OVF shooting feel, and F-mount lens depth keep it relevant
      long after launch.
    - Battery life and DSLR ergonomics remain a genuine advantage for some
      buyers.
  tradeoffs:
    - Size, weight, and lack of IBIS make it feel much older beside Nikon's
      better Z bodies.
    - Some headline performance claims assume accessory battery setups, so used
      buyers should look closely at what is actually included.
    - If you are starting from zero, Nikon mirrorless is often the cleaner
      long-term system choice.
  ownership_notes:
    maintenance_tips:
      - Check mount wear and AF calibration if the body lived on heavy zooms or
        primes.
      - Inspect both card slots and the memory-card doors because pro DSLR
        bodies often see high write counts.
      - If fast burst is part of your reason to buy one, verify exactly which
        battery and grip configuration the seller used.
    firmware_notes:
      - Keep the D850 on current Nikon firmware, but buy it because you want the
        DSLR experience, not because you expect it to behave like a modern
        stacked mirrorless body.
