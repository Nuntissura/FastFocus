content_modules:
  bio: "The Nikon Z50 is the small-system Nikon in this launch set: an APS-C
    mirrorless body that stays easy to carry and approachable to buy, but makes
    more sense for stills and casual creator use than for demanding professional
    workflows."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Check the sensor, EVF, and the flip-down screen hinge because compact
        bodies are often tossed into bags with less care.
      severity: high
    - code: check_shutter_and_controls
      label: Test dials, touchscreen response, and burst behavior because this body
        often served as a first 'real camera' for new owners.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect the micro USB, micro HDMI, and single SD slot closely because
        smaller ports wear faster.
      severity: medium
    - code: check_battery_and_charging
      label: Check EN-EL25 health and budget for spares, because this body does not
        hide battery limits with a larger pack.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Travel and everyday shooters who want a genuinely compact Nikon
      interchangeable-lens setup.
    - Buyers moving up from phones who want a small camera with room to grow
      into the Z system.
    - Casual creators who care more about size and ease than about pro-grade
      ports or dual-card redundancy.
  not_ideal_for:
    - Buyers who specifically want in-body stabilization.
    - People doing paid work that really benefits from two card slots.
    - Anyone who wants the best Nikon creator or hybrid-video feature set.
  strengths:
    - It stays small enough that owners are more likely to actually carry it.
    - 11 fps and Nikon handling make it more capable than many 'starter camera'
      labels imply.
    - It is one of the cleaner Nikon entry points for buyers who do not need
      full-frame.
  tradeoffs:
    - No IBIS means lens choice matters more than with Nikon's stabilized
      full-frame bodies.
    - Single-card storage and smaller ports reduce confidence for heavier paid
      use.
    - APS-C Z lens breadth is still less mature than the full-frame Nikon Z
      ecosystem.
  ownership_notes:
    maintenance_tips:
      - Check the screen mechanism and tripod mount for strain if the camera
        spent time on small creator rigs.
      - Inspect micro USB and HDMI carefully because those are weaker wear
        points than modern full-size ports.
      - Try the exact SD cards you plan to use, because a single-slot body
        leaves no fallback.
    firmware_notes:
      - Keep firmware current, but buy the Z50 for size and ease, not because
        you expect later firmware to erase its hardware limits.
