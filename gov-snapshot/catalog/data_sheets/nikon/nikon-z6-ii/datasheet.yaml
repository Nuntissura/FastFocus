content_modules:
  bio: "The Nikon Z6 II is the sensible used full-frame Nikon mirrorless buy for
    many people: enough speed, IBIS, dual-card reassurance, and current lens
    access without the cost of Nikon's newer EXPEED 7 generation."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the sensor, EVF, and tilt screen because many used examples have
        seen event or wedding work.
      severity: high
    - code: check_shutter_and_controls
      label: Test burst behavior, joystick response, shutter count, and both command
        dials before buying.
      severity: high
    - code: check_ports_and_card_slot
      label: Verify CFexpress/XQD and SD slot writes and inspect USB-C plus mini HDMI
        ports for tethering wear.
      severity: medium
    - code: check_battery_and_charging
      label: Check EN-EL15c health and confirm in-camera USB-C charging still works.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Buyers who want a strong used full-frame Nikon mirrorless body without
      paying Z6 III or Z8 money.
    - Event, portrait, and travel shooters who value IBIS and dual storage more
      than headline video specs.
    - People moving from Nikon DSLR to Z-mount who want a very balanced first
      full-frame mirrorless body.
  not_ideal_for:
    - Buyers who specifically want Nikon's newest subject-detection autofocus
      generation.
    - Heavy wildlife specialists who need the stacked-sensor class bodies for
      faster readout and deeper burst confidence.
    - Creators who want full-size HDMI and stronger headline video specs.
  strengths:
    - It fixes the original Z6's single-slot concern and remains a very rounded
      stills-first hybrid body.
    - 24.5 MP keeps file sizes reasonable while still giving strong full-frame
      image quality.
    - Used pricing is now attractive relative to how competent the camera still
      is.
  tradeoffs:
    - Autofocus and video are clearly older generation beside the Z6 III and Z8.
    - The tilt-only screen is less flexible for solo video than a vari-angle
      design.
    - Mini HDMI is less robust than the full-size port found on newer Nikon
      hybrids.
  ownership_notes:
    maintenance_tips:
      - Pay attention to card-slot reliability because dual-slot value
        disappears if either side is temperamental.
      - Inspect the mount and grip rubber for wear on bodies that lived with
        heavier zooms.
      - Update firmware before testing AF behavior because Nikon improved this
        body materially after launch.
    firmware_notes:
      - The Z6 II is worth running on current firmware because Nikon has
        continued to improve autofocus and compatibility.
