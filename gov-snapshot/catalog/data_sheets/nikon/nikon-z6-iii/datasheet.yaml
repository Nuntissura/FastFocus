content_modules:
  bio: "The Nikon Z6 III is the most balanced modern Nikon in the current launch
    wave: a fast-reading 24 MP full-frame body with strong autofocus, real video
    credibility, and enough speed to cover paid stills work without forcing you
    up to Z8 money."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Check the vari-angle hinge, EVF, and fast sensor readout behavior for
        banding or dead pixels after heavy video use.
      severity: high
    - code: check_shutter_and_controls
      label: Test front and rear dials, joystick, AF-ON, and burst behavior because
        hybrid bodies often see constant event or creator use.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect the full-size HDMI, USB-C, mic, headphone, CFexpress/XQD, and SD
        slot for wear from cages or capture setups.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm EN-EL15c health and verify in-camera USB-C charging works
        reliably.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Buyers who want one Nikon body that can genuinely handle paid stills work
      and serious video without jumping to flagship size or cost.
    - Event, portrait, and travel shooters who value 24 MP flexibility, fast
      autofocus, and better motion handling than older Z6 bodies.
    - Hybrid creators who need full-size HDMI and current-gen Nikon autofocus in
      a body that is still reasonable to carry every day.
  not_ideal_for:
    - People who specifically want maximum resolution for landscape or studio
      cropping headroom.
    - Wildlife specialists who would still benefit from the Z8 or Z9 burst and
      subject-tracking ceiling.
    - Budget buyers looking for the cheapest entry into full-frame Nikon
      mirrorless.
  strengths:
    - The partially stacked sensor fixes a lot of the old Z6-series readout
      weakness without turning the body into an oversized flagship.
    - Full-size HDMI, EXPEED 7, and strong autofocus make it more futureproof
      than most used mid-tier hybrids.
    - It sits in a very attractive middle ground between older value Nikon
      bodies and the flagship-class Z8.
  tradeoffs:
    - Used pricing is still high enough that some buyers will decide a Z6 II or
      Z5 gives better value per euro.
    - 24 MP is versatile, but it is not the answer if your priority is heavy
      cropping for wildlife or commercial detail work.
    - The most attractive video and autofocus gains only matter if you actually
      need a modern hybrid tool rather than a stills-first bargain body.
  ownership_notes:
    maintenance_tips:
      - Check for cage marks, loose port covers, and worn strap lugs because
        early used examples are likely to come from hybrid shooters.
      - Run a quick CFexpress and SD write test before buying because
        dual-format slots are great until one side becomes unreliable.
      - Inspect the rear screen and hinge carefully if the body spent time on
        gimbals or video rigs.
    firmware_notes:
      - Install the latest Nikon firmware before judging autofocus behavior,
        codec options, or lens/body stabilization coordination.
