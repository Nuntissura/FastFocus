content_modules:
  bio: "The Canon EOS R8 is the lightweight current full-frame Canon body in this
    relaunch set: small, modern, and surprisingly capable, but clearly optimized
    around portability rather than around redundancy or pro-body depth. It
    matters because it is often the most practical way into current RF
    full-frame for buyers who want to keep their kit small."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and sensor output for dead pixels, banding,
        or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test the main controls, shutter feel, and the vari-angle hinge because
        compact bodies feel more compromised when any control starts to go
        vague.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect the single SD slot, USB-C, micro HDMI, and mic input for wear
        because the body has less redundancy than the R6 or R5 lines.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm LP-E17 health and be realistic about battery expectations on a
        small full-frame body.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Travel and everyday-carry buyers who want current Canon full-frame quality
      in the lightest RF body in this wave.
    - Users who want modern Canon autofocus but do not need dual cards or IBIS.
    - People building a lighter full-frame RF kit rather than a heavy work setup.
  not_ideal_for:
    - Buyers who need dual-card redundancy, stronger battery life, or a
      pro-style body.
    - People who want IBIS as a core part of the package.
    - Users who will push the body hard enough that the R6 line is the better
      tool.
  strengths:
    - It makes current Canon full-frame more accessible in both price and size.
    - Autofocus and image quality feel much more current than the body's size
      suggests.
    - For many buyers, portability is the whole point, and the R8 delivers that
      cleanly.
  tradeoffs:
    - Single-card storage and no IBIS are real tradeoffs, not footnotes.
    - Battery life and handling are less forgiving than on Canon's larger bodies.
    - If you stretch too close to used R6 money, the case becomes weaker.
  ownership_notes:
    maintenance_tips:
      - Inspect the SD slot and battery door carefully because small bodies tend
        to show wear there first.
      - Check the hinge and micro HDMI port if the body came from creator or
        travel use.
      - Test with the lens size you actually plan to use because balance matters
        more on small bodies.
    firmware_notes:
      - Keep the R8 on current Canon firmware, but buy it because you want the
        compact full-frame package, not because it will grow into an R6.
