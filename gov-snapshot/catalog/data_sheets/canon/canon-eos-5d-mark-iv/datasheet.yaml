content_modules:
  bio: "The Canon EOS 5D Mark IV is the late full-frame Canon DSLR reference body
    in this restart wave: durable, familiar, and still highly credible for
    wedding, portrait, and commercial stills work. It matters because a lot of
    Canon buyers still want proven DSLR handling and EF-lens depth more than
    they want the newest mirrorless feature stack."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the optical viewfinder, rear screen, and files for dead pixels,
        sensor issues, or heavy service wear.
      severity: high
    - code: check_shutter_and_controls
      label: Test the shutter, joysticks, top controls, and both card workflows
        because many 5D Mark IV bodies have genuine professional mileage.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect CompactFlash and SD slots, USB, HDMI, and audio ports for wear
        from tethering, studio use, or frequent media swaps.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm LP-E6N health and ask about shutter count or professional
        workload history.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Buyers who still prefer full-frame Canon DSLR handling and
      optical-viewfinder shooting.
    - EF-lens owners who want a dependable late-era pro DSLR rather than an RF
      migration project.
    - Wedding, portrait, and commercial stills buyers who value a proven
      workhorse body.
  not_ideal_for:
    - Users who specifically want the newest autofocus or mirrorless
      subject-detection behavior.
    - People starting from scratch who do not already care about the EF
      ecosystem.
    - Buyers who need a lightweight or travel-friendly kit first.
  strengths:
    - It is still one of the clearest Canon DSLR pro-body buys in the used
      market.
    - Resolution, OVF handling, and EF lens depth keep it relevant.
    - For the right buyer, it feels like a mature tool rather than a nostalgic
      compromise.
  tradeoffs:
    - It is undeniably older-generation in autofocus philosophy, size, and
      system direction.
    - Working pro copies can have a lot of mileage, so condition matters heavily.
    - If you do not specifically want a DSLR, the mirrorless case is
      increasingly strong.
  ownership_notes:
    maintenance_tips:
      - Check shutter count and the condition of both card slots before buying.
      - Inspect mount wear and body edges for signs of heavy professional use.
      - Test Live View and tethering if those matter to your workflow.
    firmware_notes:
      - Keep the 5D Mark IV on current Canon firmware, but buy it because the
        DSLR proposition still fits your work, not because it will become a
        mirrorless competitor.
