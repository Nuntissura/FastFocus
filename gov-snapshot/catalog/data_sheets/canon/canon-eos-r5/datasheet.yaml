content_modules:
  bio: "The Canon EOS R5 is the high-resolution full-frame Canon reference point
    in this restart wave: 45 MP, modern autofocus, strong stabilization, and
    enough hybrid credibility that it still feels current for demanding buyers.
    It matters because it is the Canon body people buy when they want both
    detail and speed without stepping back into DSLR-era compromises."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and sensor output for dead pixels, banding,
        or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test burst behavior, AF-ON, top controls, and the vari-angle hinge
        because many R5 bodies have lived in mixed commercial and hybrid use.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect CFexpress and SD slots plus USB-C, micro HDMI, and audio ports
        for wear from high-data workflows or cages.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm LP-E6NH health and verify the body handles higher-power hybrid
        workflows cleanly.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Commercial, landscape, and wildlife buyers who want real resolution
      without abandoning modern autofocus.
    - Hybrid users who need a premium Canon body and can actually exploit its
      higher-end file and video modes.
    - Buyers who want one Canon RF body that feels distinctly flagship-adjacent.
  not_ideal_for:
    - People who do not need 45 MP and would be better served by the cheaper R6
      line.
    - Budget-conscious buyers who would resent the storage and system-cost
      premium.
    - Anyone whose workflow does not justify high-resolution files or premium
      media.
  strengths:
    - It gives Canon buyers real high-resolution headroom without sacrificing
      modern AF.
    - The R5 still feels like a serious premium Canon body rather than a
      compromised middle tier.
    - If you need both detail and responsiveness, it remains an easy body to
      understand.
  tradeoffs:
    - Everything around it gets more expensive, from media to storage to lenses
      that can exploit the sensor.
    - If you are not exploiting the resolution, the R6 line is often the smarter
      buy.
    - Used copies may come from genuinely demanding commercial or creator
      workloads.
  ownership_notes:
    maintenance_tips:
      - Test CFexpress and SD behavior with real media before buying because
        storage reliability matters more on premium bodies.
      - Inspect ports and cage points carefully because hybrid use is common.
      - Check sensor cleanliness and IBIS behavior rather than relying on a
        quick cosmetic look.
    firmware_notes:
      - Keep the R5 on current Canon firmware before judging AF, codec, or
        thermal behavior.
