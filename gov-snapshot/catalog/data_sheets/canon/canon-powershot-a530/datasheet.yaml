schema_version: "2.0"
kind: "camera_datasheet"
capture_medium: "digital"
template_id: "digital_camera_datasheet.v5"
status: "draft"

# Digital still camera template (digital-only).
# - Unknown = null
# - Use explicit units everywhere (mm, g, fps, EV, dots)
# - Prefer EU-biased canonical naming; capture US/JP names as variants/aliases
# - Comparison fields align to DPReview's side-by-side compare tool labels (see `display.comparison_sections`)

requirements:
  # These should be non-null before setting `review.facts_state` to "verified".
  must_have:
    - "identifiers.slug"
    - "identifiers.display_name"
    - "identifiers.brand_slug"
    - "identifiers.model_name"
    - "classification.camera_category"
    - "classification.lens_system_type"
    - "release.release_year"
    - "specs.sensor.sensor_format"
    - "specs.sensor.effective_resolution_mp"
    - "links.manufacturer_product_page"
  must_have_if_interchangeable:
    - "classification.mount_code"
  must_have_if_fixed_lens:
    - "classification.fixed_lens.focal_length_basis"
    - "classification.fixed_lens.focal_length_min_mm"
    - "classification.fixed_lens.focal_length_max_mm"
    - "classification.fixed_lens.max_aperture_wide_f"
    - "classification.fixed_lens.max_aperture_tele_f"

identifiers:
  slug: "canon-powershot-a530"
  canonical_url: "/cameras/canon-powershot-a530"
  brand_slug: "canon"
  brand_name: "Canon"
  model_name: "PowerShot A530"
  display_name: "Canon PowerShot A530"
  model_family: PowerShot # e.g., "EOS", "PowerShot", "IXUS"
  aliases: []
  region_variants:
    - region_code: global
      marketing_name: Canon PowerShot A530
      sku: null
  predecessor_model_slug: null
  successor_model_slug: null

classification:
  camera_category: "compact"
  target_segment: null # e.g., entry_level, enthusiast, professional
  lens_system_type: "fixed"
  mount_code: null
  fixed_lens:
    # Only fill when lens_system_type is "fixed".
    focal_length_basis: equiv_35mm # physical | equiv_35mm
    focal_length_min_mm: 35
    focal_length_max_mm: 140
    max_aperture_wide_f: 2.6
    max_aperture_tele_f: 5.5
  use_case_tags: []

release:
  announce_date: null # ISO date (YYYY-MM-DD)
  first_ship_date: null # ISO date (YYYY-MM-DD)
  release_year: 2006
  launch_msrp:
    body_only:
      amount: null
      currency: "USD"
      includes_tax: false
    with_kit_lens:
      amount: null
      currency: "USD"
      includes_tax: false
  production:
    start_year: 2006
    end_year: null
    is_discontinued: null
    confidence: 0.50

specs:
  # DPReview compare: Body type + Body material
  body:
    body_type: null # e.g., "SLR-style mirrorless", "Large sensor compact"
    body_material: null # e.g., magnesium alloy, polycarbonate
    dimensions_mm:
      w: 90
      h: 64
      d: 43
    weight_with_battery_g: 170
    weather_sealed: null

  # DPReview compare: Sensor + Image
  sensor:
    sensor_format: one_over_2_5_inch
    sensor_type: CCD # e.g., CCD, CMOS
    effective_resolution_mp: 5
    total_resolution_mp: null # DPReview: "Sensor photo detectors"
    max_resolution_px:
      w: null
      h: null
    other_resolutions: [] # DPReview: "Other resolutions" (strings are acceptable)
    image_ratio:
      w: null
      h: null
    physical_dimensions_mm:
      w: null
      h: null
    sensor_size_notes: null
    crop_factor: null
    native_iso_min: null
    native_iso_max: null
    boosted_iso_min: null
    boosted_iso_max: null
    image_processor: []
    color_space: [] # e.g., sRGB, Adobe RGB
    color_filter_array: null # e.g., Bayer, X-Trans

  image:
    white_balance_presets: null
    custom_white_balance: null
    uncompressed_format: null
    jpeg_quality_levels: [] # e.g., "Fine", "Normal"
    file_formats: [] # e.g., JPEG, RAW, HEIF

  stabilization:
    image_stabilization: null # DPReview: "Image stabilization"
    ibis: null
    lens_is: null
    digital_is: null
    cipa_rating_stops: null
    notes: null

  # DPReview compare: Optics & Focus
  optics:
    optical_zoom_x: null
    digital_zoom_x: null
    normal_focus_range_cm:
      min: null
      max: null
    macro_focus_range_cm:
      min: null
      max: null

  autofocus:
    autofocus_supported: null
    manual_focus_supported: null
    focus_method: [] # e.g., contrast_detect, phase_detect, hybrid
    focus_points_total: null # DPReview: "Number of focus points"
    phase_detect_points: null
    autofocus_assist_lamp: null
    low_light_af_ev: null
    subject_detection:
      human_eye: null
      human_face: null
      animal_eye: null

  # DPReview compare: Screen / viewfinder
  display:
    live_view: null
    rear_screen:
      size_in: null
      resolution_dots: null
      touch: null
      articulation: null # fixed | tilt | vari_angle | other
      screen_type: null # e.g., TFT LCD

  viewfinder:
    type: null # evf | ovf | none
    resolution_dots: null
    refresh_rate_hz: null
    coverage_percent: null
    magnification: null

  # DPReview compare: Photography features
  shutter:
    min_shutter_speed_s: null # DPReview: "Minimum shutter speed" (slowest)
    max_shutter_speed_mechanical_s: null # DPReview: "Maximum shutter speed" (fastest)
    max_shutter_speed_electronic_s: null
    flash_sync_speed_s: null

  exposure:
    aperture_priority: null
    shutter_priority: null
    manual_exposure_mode: null
    subject_scene_modes: null
    exposure_modes: [] # strings acceptable (keep consistent within brand)
    scene_modes: [] # strings acceptable (keep consistent within brand)
    exposure_compensation_ev:
      min: null
      max: null

  flash:
    built_in: null
    external: null
    flash_range_m:
      min: null
      max: null
    modes: []

  shooting:
    continuous_drive_fps: null # DPReview: "Continuous drive"
    continuous_fps_mechanical: null
    continuous_fps_electronic: null
    drive_modes: [] # strings acceptable
    self_timer_seconds: [] # e.g., [2, 10]
    max_buffer_frames:
      raw: null
      jpeg: null

  metering:
    metering_modes: [] # strings acceptable

  bracketing:
    ae_bracketing: null
    wb_bracketing: null

  # DPReview compare: Videography features
  video:
    resolutions: [] # DPReview: "Resolutions"
    formats: [] # DPReview: "Format"
    notes: null # DPReview: "Videography notes"
    modes: [] # DPReview: "Modes"
    microphone: null
    speaker: null
    max_internal:
      resolution: null # e.g., 4K, 6K, 8K
      frame_rate_fps: null
      bit_depth: null
    max_external:
      raw: null
    log_profiles: []
    recording_limit_minutes: null

  storage:
    storage_types: [] # DPReview: "Storage types" (e.g., SD, CFexpress)
    card_slots: 1
    slot_1_type: sd # sd | cf | cfast | cfexpress_type_b | other
    slot_2_type: null

  connectivity:
    usb_connector: null # micro_usb | mini_usb | usb_c | other
    usb_charging_supported: null
    hdmi_connector: null # micro | mini | full | other
    mic_input_3_5mm: null
    headphone_output_3_5mm: null
    wifi: null
    bluetooth: null
    wireless: null # DPReview: "Wireless" (true if any wireless is supported)
    wireless_notes: null
    remote_control: [] # DPReview: "Remote control" (strings acceptable)
    hot_shoe: null
    pc_sync_port: null

  power:
    battery_model: null
    battery_description: null
    battery_life_cipa_shots: null
    usb_charging_in_camera: null

  durability:
    shutter_rating_cycles: null

  other_features:
    orientation_sensor: null
    timelapse_recording: null
    gps: null
    gps_notes: null

