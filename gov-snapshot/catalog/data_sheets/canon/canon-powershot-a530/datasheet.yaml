review:
  facts_state: "draft"
  editorial_state: "draft"
  qa_checklist:
    - "Template is digital-only (no film fields)."
    - "slug and canonical_url follow /cameras/{slug}."
    - "EU-biased canonical name; alternates are in region_variants/aliases."
    - "If lens_system_type is interchangeable, mount_code is set."
    - "If lens_system_type is fixed, mount_code is null and fixed_lens is set."
    - "Core facts are present and sourced (release_year, sensor_format,
      resolution)."
    - "No placeholder values remain (camera-slug, Brand Name, YYYY-MM-DD)."
  last_reviewed_at: null
  last_reviewed_by: null
