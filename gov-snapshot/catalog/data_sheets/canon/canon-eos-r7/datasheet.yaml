content_modules:
  bio: "The Canon EOS R7 is the serious APS-C Canon body in this restart wave:
    fast, modern on autofocus, and built around crop reach in a way that makes
    real sense for wildlife, sport, and travel telephoto work. It matters
    because it gives Canon buyers an APS-C body that feels like an actual
    strategic choice rather than just a compromise."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and sensor output for dead pixels, banding,
        or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test burst behavior, AF-ON, dials, and the vari-angle hinge because many
        R7 bodies will have been used for wildlife or action work.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect both SD slots, USB-C, micro HDMI, and audio ports for wear from
        rigs, weather, or heavy card use.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm LP-E6NH health and verify USB-C charging or external power works
        reliably.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Wildlife and sports buyers who want crop reach and current Canon autofocus
      without jumping to larger or pricier full-frame bodies.
    - Travel shooters who want a lighter Canon telephoto setup.
    - Buyers who want a serious APS-C Canon body rather than a casual-entry
      model.
  not_ideal_for:
    - Users who specifically want full-frame depth of field and low-light
      behavior.
    - People who do not benefit from APS-C reach or smaller telephoto kits.
    - Buyers whose workloads justify going straight to full-frame R6 or R5
      bodies.
  strengths:
    - It finally makes Canon APS-C feel strategic again for wildlife and action
      buyers.
    - Current autofocus plus crop reach is a very strong combination in the used
      market.
    - Dual cards and a larger battery platform make it more serious than smaller
      APS-C bodies.
  tradeoffs:
    - If you do not value APS-C reach, the case versus Canon full frame gets
      weaker.
    - Used examples may already have hard wildlife or sports mileage.
    - Balance with longer lenses still matters, even if the sensor format helps
      with portability.
  ownership_notes:
    maintenance_tips:
      - Run real dual-card and burst tests before buying because action
        reliability matters here.
      - Inspect the mount, grip, and strap points for telephoto wear.
      - Look for weather-use clues such as door wear, grit, or damaged port
        covers.
    firmware_notes:
      - Keep the R7 on current Canon firmware because autofocus behavior is
        central to why people buy it.
