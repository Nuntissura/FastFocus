content_modules:
  bio: The Panasonic Lumix S5 II is the current mainstream Panasonic full-frame
    body that finally closes the autofocus trust gap for many buyers. It matters
    because it keeps Panasonic's strong video DNA, adds phase hybrid AF, and
    stays relatively compact for a serious hybrid full-frame tool.
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and sensor output for dead pixels, heat
        stress, or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test both dials, joystick, AF-ON, burst behavior, and the vari-angle
        hinge because these bodies are often used hard for mixed stills and
        creator work.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect the full-size HDMI, USB-C, audio jacks, and both SD slots for
        wear from cages, monitors, SSD workflows, or heavy card churn.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm DMW-BLK22 health and verify USB-C charging or external power
        works reliably.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Buyers who want one current Panasonic full-frame body that handles both
      stills and video credibly.
    - Hybrid shooters who value Panasonic's video tools but previously avoided
      older contrast-AF bodies.
    - Event, portrait, and creator users who need strong connectivity and
      dependable stabilization.
  not_ideal_for:
    - People who already know they need a faster or more premium flagship-class
      body.
    - Buyers who only care about cheap used full-frame access and do not need
      current autofocus behavior.
    - Pure stills-first shooters who do not benefit from Panasonic's deep hybrid
      toolset.
  strengths:
    - It is the easiest Panasonic full-frame body to recommend broadly because
      the autofocus story is finally modern enough.
    - Full-size HDMI, strong IBIS, and solid video modes make it feel serious
      rather than compromised.
    - It keeps Panasonic's hybrid strengths without becoming an oversized
      flagship.
  tradeoffs:
    - Used and discounted prices are still high enough that some buyers may
      choose the older S5 for value instead.
    - If you do not use the hybrid features, part of the appeal is wasted.
    - L-mount lens cost and size can still be higher than some APS-C
      alternatives.
  ownership_notes:
    maintenance_tips:
      - Check both SD slots and run a real write test before buying because
        dual-slot reliability matters on a hybrid workhorse.
      - Inspect cage marks and HDMI wear, especially on bodies sold by creators
        or videographers.
      - Test IBIS and sensor alignment at slower shutter speeds rather than
        relying only on cosmetics.
    firmware_notes:
      - Keep the S5 II on current Panasonic firmware because autofocus,
        workflow, and connectivity behavior are all part of the ownership value.
