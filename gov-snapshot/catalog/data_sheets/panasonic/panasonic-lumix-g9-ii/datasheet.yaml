content_modules:
  bio: "The Panasonic Lumix G9 II is the most broadly compelling current Panasonic
    Micro Four Thirds body in the wave: fast enough for action, current enough
    on autofocus to trust, and small-system friendly in a way full-frame kits
    often are not. It matters because it fixes the biggest objection many buyers
    had to older Panasonic stills bodies."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and sensor output for dead pixels, heat
        stress, or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test burst operation, joystick, AF-ON, both dials, and the vari-angle
        hinge because action-oriented bodies tend to see more intensive use.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect full-size HDMI, USB-C, audio jacks, and both SD slots for wear
        from rigs, fast card turnover, or transport abuse.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm DMW-BLK22 health and test sustained burst or subject-tracking
        behavior before buying.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Wildlife, sports, and travel buyers who want more reach and smaller lenses
      than full frame usually provides.
    - Panasonic users who wanted current autofocus before buying into a newer
      body.
    - Hybrid shooters who want a more photography-friendly Micro Four Thirds
      body than the GH line.
  not_ideal_for:
    - Buyers who mainly care about video codecs or a video-first body identity.
    - People who do not value Micro Four Thirds size and reach advantages.
    - Users who would be happier with the cheapest possible used G9 or GH5
      instead of a current body.
  strengths:
    - It finally makes Panasonic Micro Four Thirds easier to recommend to
      general action and wildlife buyers.
    - The smaller-system advantage remains real, especially with telephoto work.
    - It offers a cleaner stills-versus-video balance than the GH6.
  tradeoffs:
    - If you do not value the format's size and reach benefits, the case versus
      full frame is weaker.
    - Current used prices can still be high because the autofocus story is
      meaningfully improved.
    - Video-first users may still prefer the GH line's identity and codec
      emphasis.
  ownership_notes:
    maintenance_tips:
      - Check the card slots, shutter feel, and tracking behavior with a real
        lens rather than relying on a quick menu walk-through.
      - Inspect the screen hinge and port covers because action bodies travel a
        lot.
      - Look for heavy grip wear or mount wear from long telephoto use.
    firmware_notes:
      - Keep the G9 II on current firmware because autofocus and workflow trust
        are part of the whole reason to buy it.
