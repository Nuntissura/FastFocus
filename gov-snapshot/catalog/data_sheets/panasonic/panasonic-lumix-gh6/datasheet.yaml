content_modules:
  bio: "The Panasonic Lumix GH6 is the video-first Micro Four Thirds anchor in the
    current restart wave: deep internal codecs, serious I/O, strong
    stabilization, and a body built for people who actually use video features
    instead of just admiring them on a spec sheet. It matters because it still
    offers a distinct kind of value even in a crowded hybrid market."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, articulated screen, and sustained recording behavior for
        hot pixels, overheating history, or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test every record button, dial, AF-ON, and menu control because GH bodies
        often live on sets and rigs rather than in light hobby use.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect full-size HDMI, USB-C, audio jacks, CFexpress slot, and SD slot
        for wear from cages, SSD workflows, or repeated cable strain.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm DMW-BLK22 health and test a longer clip or sustained burst to
        catch heat or power instability before buying.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Video-first buyers who want strong internal codecs and real
      production-friendly I/O.
    - Users who value smaller Micro Four Thirds lenses and reach more than
      full-frame branding.
    - Hybrid shooters who care about stabilization and format flexibility enough
      to accept Panasonic's older AF behavior on this generation.
  not_ideal_for:
    - Buyers who specifically want phase-detect AF in their Panasonic workflow.
    - People who want the smallest or cheapest Micro Four Thirds body possible.
    - Stills-first buyers who will never exploit the GH6's video depth.
  strengths:
    - It still feels purpose-built for serious video rather than like a stills
      camera with some extras attached.
    - Full-size HDMI, CFexpress support, and strong internal formats give it a
      real workflow edge.
    - Micro Four Thirds kit size can still be a major advantage for travel,
      documentary, and gimbal work.
  tradeoffs:
    - Contrast-detect AF is the obvious weak point beside newer Panasonic bodies.
    - The body is not especially small for the format, so you need to benefit
      from the feature depth.
    - If you do not need the codec or workflow headroom, a simpler body will
      make more sense.
  ownership_notes:
    maintenance_tips:
      - Inspect every cage contact point and every port carefully because GH6
        bodies are often genuinely worked.
      - Run real CFexpress and SD tests before trusting a used copy for paid
        video work.
      - Check the screen hinge and cooling behavior with a longer clip rather
        than just a quick power-on.
    firmware_notes:
      - Keep the GH6 on current firmware because Panasonic has continued
        refining compatibility and workflow features.
