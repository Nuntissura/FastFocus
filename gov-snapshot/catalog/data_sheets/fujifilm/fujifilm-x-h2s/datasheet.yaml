content_modules:
  bio: "The Fujifilm X-H2S is the fast-body answer in the Fujifilm line: a stacked
    APS-C flagship aimed at buyers who care about burst speed, subject tracking,
    and video readout more than maximum resolution. It is the right used-market
    pick if you want Fujifilm to behave like a modern action or hybrid tool
    rather than a style-first camera."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and stacked-sensor output for dead pixels
        or heat-related artifacts after hard use.
      severity: high
    - code: check_shutter_and_controls
      label: Test burst operation, AF-ON, joystick, both dials, and custom buttons
        because speed-first bodies often see hard event or wildlife use.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect full-size HDMI, USB-C, audio jacks, CFexpress slot, and SD slot
        for wear from cages, monitors, and high-data-rate workflows.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm NP-W235 health and check that the body behaves cleanly during
        sustained bursts or longer video clips.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Wildlife, sports, and action buyers who want Fujifilm's strongest APS-C
      speed body.
    - Hybrid users who care about readout behavior and pro-body handling more
      than 40 MP detail.
    - Photographers who need a tougher workhorse than the smaller Fujifilm
      bodies provide.
  not_ideal_for:
    - Landscape or studio buyers who would benefit more from the X-H2's
      resolution.
    - People buying Fujifilm mainly for compactness or nostalgic control layout.
    - Budget-focused buyers who do not need flagship-speed behavior.
  strengths:
    - This is the Fujifilm body that feels most credible as an action and
      wildlife tool.
    - The stacked sensor gives it a fundamentally different character from the
      resolution-first X-H2.
    - Full-size HDMI, dual-card workflow, and better motion handling make it the
      safer pro-body Fujifilm choice for hybrid use.
  tradeoffs:
    - 26 MP is enough for most work, but some buyers will still prefer the X-H2
      or GFX files for heavy cropping and detail.
    - Used prices remain high because the X-H2S sits at the top of the APS-C
      performance stack.
    - If you do not actually shoot motion-intensive subjects, the speed premium
      can be wasted.
  ownership_notes:
    maintenance_tips:
      - Run real CFexpress and SD card tests before buying because this body
        invites high-bandwidth use.
      - Inspect cage marks, port covers, and tripod plate wear because the body
        is often rigged.
      - Test sustained bursts and subject tracking rather than relying on a
        cosmetic inspection alone.
    firmware_notes:
      - Keep the X-H2S on current Fujifilm firmware because autofocus, subject
        detection, and video stability have all benefited from updates.
