content_modules:
  bio: "The Fujifilm GFX 100S is the medium-format halo body in the launch wave: a
    102 MP 44x33 system camera for buyers who care about image quality, tonal
    depth, and serious cropping headroom more than speed or compactness. It
    matters because it gives Fast Focus a clear high-end reference point that
    behaves differently from the APS-C Fujifilm bodies."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, tilt screen, and 102 MP files carefully for dead pixels,
        IBIS anomalies, or sensor contamination because every flaw is magnified
        on a body like this.
      severity: high
    - code: check_shutter_and_controls
      label: Test both command dials, joystick, top controls, and IBIS behavior
        because medium-format bodies are expensive to repair and often bought
        for paid work.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect both SD slots, USB-C, HDMI, audio ports, and tripod mount for
        tethering or studio-rig wear.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm NP-W235 health and verify the body powers and charges cleanly
        over USB-C.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Commercial, studio, portrait, and landscape buyers who genuinely benefit
      from medium-format output.
    - Photographers who want far more cropping and print flexibility than APS-C
      or typical full-frame bodies provide.
    - Buyers who want a more manageable medium-format body than older, larger
      systems.
  not_ideal_for:
    - Generalist buyers who mainly shoot action, family, or travel and do not
      need 102 MP medium-format files.
    - Anyone treating it as a cheaper substitute for a fast hybrid full-frame
      body.
    - Budget-conscious buyers who are still building out lenses and support gear.
  strengths:
    - It delivers a genuinely different imaging proposition from the APS-C
      Fujifilm line.
    - The 100S body shape makes medium format more approachable than older bulky
      systems.
    - If your work rewards detail and tonal depth, this body can justify itself
      quickly.
  tradeoffs:
    - Everything around it gets more expensive, slower, and heavier than the
      APS-C Fujifilm ecosystem.
    - If you do not need medium format, the body makes far less sense than an
      X-H2 or X-T5.
    - Used buyers need to be especially cautious because repair stakes are
      higher here than on smaller enthusiast bodies.
  ownership_notes:
    maintenance_tips:
      - Inspect the sensor and IBIS carefully because high-resolution
        medium-format bodies are unforgiving of hidden issues.
      - Check both card slots and all tethering ports if the body came from a
        studio workflow.
      - Look for grip wear, baseplate wear, and mount wear from heavy GF lenses.
    firmware_notes:
      - Keep firmware current before judging autofocus or tethered workflow
        stability on the GFX 100S.
