content_modules:
  bio: The Fujifilm X-T4 is the used-market bridge between older 26 MP Fujifilm
    bodies and the newer X-Processor 5 generation. It still matters because it
    brought IBIS and the bigger NP-W235 battery into the classic X-T line, which
    makes it feel meaningfully more capable than older Fujifilm enthusiast
    bodies even in 2026.
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and sensor output for dead pixels, banding,
        or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test every top-plate dial and the vari-angle hinge because control feel
        is a big part of why buyers still choose the X-T4.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect both SD slots, micro HDMI, USB-C, and audio ports for wear from
        hybrid or travel-heavy use.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm NP-W235 health and verify USB-C charging works cleanly because
        battery-life gains are part of the X-T4's appeal.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Buyers who want classic Fujifilm handling with IBIS and a more modern
      battery system at a lower used price than the X-T5.
    - Travel and portrait shooters who value the X-T line but do not need the
      newer 40 MP sensor.
    - Hybrid users who want a stills-first Fujifilm body that can still handle
      serious video work.
  not_ideal_for:
    - Buyers who specifically want Fujifilm's newest autofocus behavior or
      subject-detection logic.
    - Anyone who already knows they prefer the smaller X-S bodies or the
      deeper-grip X-H bodies.
    - People who want maximum APS-C detail for aggressive cropping.
  strengths:
    - It still feels like a serious upgrade over older 26 MP Fujifilm bodies
      because of IBIS and battery life.
    - The used price often lands in a very attractive middle zone between older
      bargains and current bodies.
    - It keeps much of the classic Fujifilm charm while remaining capable enough
      for paid work.
  tradeoffs:
    - Autofocus and subject detection are no longer current-gen beside the
      X-S20, X-T5, and X-H line.
    - Micro HDMI remains a weak point for heavy hybrid users.
    - Some buyers will decide the step to an X-T5 is worth it for the extra
      detail and newer support stack.
  ownership_notes:
    maintenance_tips:
      - Check the body for heavy travel wear, top-dial dents, and hinge
        looseness before buying.
      - Run a write test on both SD slots because dual-slot reliability matters
        on a workhorse enthusiast body.
      - Inspect the USB-C and HDMI doors because frequent hybrid use can show up
        there first.
    firmware_notes:
      - Update to the latest Fujifilm firmware before judging autofocus or
        wireless behavior on a used X-T4.
