content_modules:
  bio: "The Fujifilm X-T30 II is the value-oriented compact X-T option in the
    current wave: light, capable, and still built around Fujifilm's strong 26 MP
    APS-C generation. It matters because many used buyers want Fujifilm color
    and control feel without paying X-T5 or X-H money."
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect the EVF, rear screen, and sensor output for dead pixels, banding,
        or impact damage.
      severity: high
    - code: check_shutter_and_controls
      label: Test the command dials, exposure controls, and rear-screen tilt action
        because compact bodies are more annoying to live with when any control
        goes vague.
      severity: high
    - code: check_ports_and_card_slot
      label: Inspect the single SD slot, USB-C, and micro HDMI for wear because there
        is no slot redundancy and little physical protection.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm NP-W126S health and ask how often the camera was used for longer
        video or travel days.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Buyers who want the Fujifilm X-T feel in a compact and more affordable
      used body.
    - Travel and daily-carry shooters who do not need IBIS or pro-body
      connectivity.
    - People who care about image quality and size more than having the newest
      autofocus stack.
  not_ideal_for:
    - Users who need IBIS, weather sealing, or dual-card security.
    - Anyone who wants a serious hybrid-video body rather than a compact
      stills-oriented Fuji.
    - People who want the best long-term runway in the Fujifilm lineup.
  strengths:
    - It often delivers one of the best price-to-image-quality ratios in the
      Fujifilm used market.
    - The body stays compact enough to pair well with smaller primes and zooms.
    - The control layout still gives a lot of the Fuji appeal without
      premium-body cost.
  tradeoffs:
    - Single-slot storage, no IBIS, and lighter build make it a worse hard-use
      tool body than larger Fuji options.
    - Micro HDMI and older battery platform limit its appeal for hybrid shooters.
    - If the price gap is small, many buyers will prefer to stretch to an X-S20
      or X-T4.
  ownership_notes:
    maintenance_tips:
      - Check for dial wear, screen wobble, and hot-shoe looseness because small
        enthusiast bodies see lots of daily handling.
      - Test the SD slot with a real card before buying because a single-slot
        body offers no fallback.
      - Inspect the corners and grip for travel wear or drops.
    firmware_notes:
      - Keep firmware current, but buy the X-T30 II because it is good value
        now, not because it will become a newer-generation body later.
