content_modules:
  bio: The Sony ZV-E10 is the entry creator body in the E-mount lineup, built around a side-flip screen, strong autofocus, and simple video-first controls rather than EVF-first traditional camera ergonomics.
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect sensor, LCD/EVF, and test for dead/hot pixels.
      severity: high
    - code: check_shutter_and_controls
      label: Test the zoom rocker, record button, rear dial, and touchscreen because creator bodies often live on rigs and tripods.
      severity: high
    - code: check_ports_and_card_slot
      label: Check the micro HDMI, USB-C, mic, and headphone ports carefully because streaming and vlogging setups wear them quickly.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm NP-FW50 health and verify USB-C charging works, since many used bodies spent time plugged into capture setups.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - New creators who want Sony autofocus, a side-flip screen, and interchangeable lenses without paying full-frame money.
    - Lightweight travel or everyday video setups where a small body and compact OSS lens matter more than pro redundancy.
    - Buyers who care more about creator-friendly controls and USB streaming than about EVF-based stills shooting.
  not_ideal_for:
    - Buyers who want in-body stabilization for handheld video.
    - Anyone who shoots a lot of bright daylight stills and really wants an eye-level viewfinder.
    - Heavy paid work where one card slot and the smaller NP-FW50 battery become obvious limitations.
  strengths:
    - Excellent autofocus and a creator-first control layout make it approachable for solo shooters.
    - E-mount lens choice gives it more room to grow than many fixed-lens vlogging cameras.
    - The body stays small and cheap enough to be a practical first serious camera.
  tradeoffs:
    - No EVF and no IBIS change the stills and handheld-video experience.
    - Port durability matters more here because many used units have lived on cages, tripods, and capture cards.
    - Battery life and single-slot storage are fine for casual use but not premium for paid work.
  ownership_notes:
    maintenance_tips:
      - Inspect the mic and headphone jacks for crackle or looseness with real plugs inserted.
      - Check for hinge play in the flip screen and for stripped tripod threads if the body lived on a desk rig.
      - Budget for extra NP-FW50 batteries if you plan longer shoots.
    firmware_notes:
      - Update to the latest Sony system software before relying on USB streaming, autofocus tweaks, or mobile transfer behavior.
