    - code: check_sensor_and_screen
      label: Inspect sensor, LCD/EVF, and test for dead/hot pixels.
      severity: high
    - code: check_shutter_and_controls
      label: Test shutter across speeds and verify all dials/buttons respond.
      severity: high
    - code: check_ports_and_card_slot
      label: Check USB/HDMI/audio ports and card slot(s) for wear and reliable writes.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm battery health and charging behavior (including in-camera USB if
        supported).
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Travel and street shooters who want current Sony full-frame autofocus in
      the smallest practical body.
    - Solo creators who need a vari-angle screen, modern subject recognition,
      and good battery life in a compact package.
    - Buyers who care more about portability and current AF than dual-card
      redundancy.
  not_ideal_for:
    - Anyone who insists on dual-card backup for paid event work.
    - Users who mainly shoot with large fast telephoto lenses and prefer a
      deeper grip and larger body balance.
    - Buyers who want full-width full-frame 4K/60 rather than the Super 35 crop
      mode.
  strengths:
    - 33 MP gives real cropping headroom while keeping the body dramatically
      smaller than Sony's larger full-frame models.
    - Sony's latest AF generation makes it feel much more current than older
      compact full-frame options.
    - The NP-FZ100 battery and USB-C charging make it far easier to live with
      than many small-body alternatives.
  tradeoffs:
    - Single-card storage is the biggest practical compromise.
    - The compact body is less comfortable with heavier lenses than an A7
      IV-style shell.
    - The EVF and handling are good for the size, but not as luxurious as Sony's
      larger premium bodies.
  ownership_notes:
    maintenance_tips:
      - Check the vari-angle screen hinge and cable feel carefully because
        compact creator-oriented bodies often see heavy vlogging use.
      - Inspect the single card slot and door latch for wear because there is no
        redundancy if it fails.
      - Try the body with your heaviest planned lens before buying if ergonomics
        matter.
    firmware_notes:
      - Update to the latest Sony firmware before evaluating AF behavior,
        transfer reliability, or USB streaming stability.
