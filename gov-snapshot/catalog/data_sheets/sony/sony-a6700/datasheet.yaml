content_modules:
  bio: The Sony a6700 is the compact APS-C Alpha body for buyers who want modern subject recognition, strong stills speed, and unusually deep video tools without moving up to a heavier full-frame kit.
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect sensor, LCD/EVF, and test for dead/hot pixels.
      severity: high
    - code: check_shutter_and_controls
      label: Test shutter, front dial, rear wheel, AF joystick, and the record button because compact Sony bodies see heavy one-handed use.
      severity: high
    - code: check_ports_and_card_slot
      label: Check the SD slot, HDMI micro, USB-C, and audio ports for bent contacts or loose fit from cages and microphones.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm NP-FZ100 health and verify USB-C charging or power delivery behaves normally.
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Buyers who want a small travel-friendly body without giving up modern autofocus and serious video features.
    - Wildlife or family shooters who benefit from APS-C reach, 11 fps bursts, and strong subject recognition.
    - Creators who want 10-bit 4K and USB streaming in a lighter, cheaper package than Sony full-frame bodies.
  not_ideal_for:
    - Buyers who strongly prefer dual-card storage for paid work.
    - Anyone who dislikes micro HDMI durability or small-body ergonomics with larger lenses.
    - People chasing the lowest used prices, because the a6700 remains current and relatively expensive second-hand.
  strengths:
    - Excellent autofocus and subject recognition for an APS-C body.
    - 4K/120, 10-bit codecs, and USB streaming make it unusually capable for solo creators.
    - Compact size keeps the overall Sony E-mount travel kit lighter than comparable full-frame setups.
  tradeoffs:
    - Only one card slot, which limits redundancy for critical paid work.
    - The EVF is functional rather than luxurious compared with Sony's pricier bodies.
    - 4K/120 uses a crop, and the compact grip can feel cramped with heavier lenses.
  ownership_notes:
    maintenance_tips:
      - Test the card slot door and latch carefully because single-slot bodies often see more repeated use.
      - Inspect the HDMI micro port if the camera was used with external monitors or capture cards.
      - Try your heaviest intended lens on the body before buying if grip comfort matters to you.
    firmware_notes:
      - Install the latest Sony firmware before evaluating smartphone transfer reliability, LUT behavior, or Wi-Fi stability.
