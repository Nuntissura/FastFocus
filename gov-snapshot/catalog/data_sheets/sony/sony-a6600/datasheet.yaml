  bio: null
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect sensor, LCD/EVF, and test for dead/hot pixels.
      severity: high
    - code: check_shutter_and_controls
      label: Test shutter across speeds and verify all dials/buttons respond.
      severity: high
    - code: check_ports_and_card_slot
      label: Check USB/HDMI/audio ports and card slot(s) for wear and reliable writes.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm battery health and charging behavior (including in-camera USB if
        supported).
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Travel and family shooters who want excellent autofocus and battery life
      in a very small APS-C body.
    - Wildlife or outdoor buyers who value APS-C reach and 11 fps bursts more
      than the newest video codecs.
    - Used buyers who want Sony E-mount flexibility without paying current a6700
      prices.
  not_ideal_for:
    - Creators who want a front-facing vari-angle screen or newer 10-bit video
      workflows.
    - Anyone who needs dual-card storage or a headphone jack.
    - Users who regularly mount large heavy lenses and want a deeper modern grip.
  strengths:
    - Excellent battery life for a compact mirrorless body thanks to the
      NP-FZ100.
    - 425-point AF, IBIS, and 11 fps still make it a capable used-buying sweet
      spot in Sony APS-C.
    - The small body keeps travel kits compact while preserving access to Sony
      E-mount lenses.
  tradeoffs:
    - Single UHS-I card slot and older video feature set make it feel dated
      beside the a6700.
    - The screen only tilts and does not fully articulate for self-shooting.
    - Micro HDMI and older USB connectivity are weaker for heavier creator
      workflows.
  ownership_notes:
    maintenance_tips:
      - Check the tilt screen hinge, the micro HDMI port, and the battery door
        for wear.
      - Test the single card slot thoroughly because there is no second slot
        fallback.
      - Inspect the grip rubber and EVF eyecup on heavily traveled bodies.
    firmware_notes:
      - Install the newest Sony firmware before evaluating AF behavior,
        Bluetooth pairing, or transfer reliability.
