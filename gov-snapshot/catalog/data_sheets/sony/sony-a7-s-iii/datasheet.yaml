content_modules:
  bio: null
  used_buying_checklist:
    - code: check_sensor_and_screen
      label: Inspect sensor, LCD/EVF, and test for dead/hot pixels.
      severity: high
    - code: check_shutter_and_controls
      label: Test shutter across speeds and verify all dials/buttons respond.
      severity: high
    - code: check_ports_and_card_slot
      label: Check USB/HDMI/audio ports and card slot(s) for wear and reliable writes.
      severity: medium
    - code: check_battery_and_charging
      label: Confirm battery health and charging behavior (including in-camera USB if
        supported).
      severity: medium
  known_issues: []
editorial_modules:
  recommended_for:
    - Video-first shooters who want Sony's strongest used 4K body without
      stepping into cinema cameras.
    - Low-light event or documentary work where the 12 MP sensor and dual base
      behavior are assets rather than a compromise.
    - Hybrid users who still care about stills, but prioritize video reliability
      over megapixel count.
  not_ideal_for:
    - Photographers who want high-resolution cropping room for wildlife,
      landscape, or commercial stills.
    - Buyers who do not need 4K/120 or low-light video and would be better
      served by a cheaper stills-oriented body.
    - Anyone expecting 12 MP files to substitute for a modern high-resolution
      photography camera.
  strengths:
    - 4K/120, strong codecs, and full-size HDMI make it a serious
      production-ready used buy.
    - The 12 MP sensor remains excellent in low light and avoids some readout
      compromises of higher-resolution alternatives.
    - Dual CFexpress Type A / SD slots and the 9.44M-dot EVF keep it feeling
      genuinely high-end.
  tradeoffs:
    - 12 MP is a real stills limitation if you crop heavily or print large.
    - Used prices remain firm because the A7S III is still a respected
      professional video body.
    - CFexpress Type A media can add meaningful ownership cost if you need the
      highest recording modes.
  ownership_notes:
    maintenance_tips:
      - Inspect the full-size HDMI port, hot shoe, and cage contact points
        because many copies live on rigs.
      - Test both card slots with the exact media types you plan to use for
        high-bitrate recording.
      - Check the port doors and body shell for rig wear, rental abuse, or
        overheating history.
    firmware_notes:
      - Keep firmware current before evaluating codec behavior, monitoring
        support, wireless stability, or AF performance.
